# Netlify Configuration

[build]
  command = "npm run build"
  publish = ".next"

# Configure secret scanning to ignore non-sensitive configuration keys
# These are environment variable names and default values, not actual secrets
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VISION_MODEL,TEXT_MODEL,RATE_LIMIT_WINDOW_MS,RATE_LIMIT_CALLS_PER_DAY,RATE_LIMIT_CALLS_PER_HOUR,DEFAULT_SYSTEM_PROMPT_INSTAGRAM,DEFAULT_SYSTEM_PROMPT_TWITTER,DEFAULT_SYSTEM_PROMPT_FACEBOOK,DEFAULT_SYSTEM_PROMPT_LINKEDIN,DEFAULT_SYSTEM_PROMPT_TIKTOK,DEFAULT_SYSTEM_PROMPT_PINTEREST,DEFAULT_SYSTEM_PROMPT_THREADS,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"
  SECRETS_SCAN_OMIT_PATHS = "README.md,LANGGRAPH_ARCHITECTURE.md,LANGGRAPH_EXAMPLES.md,app/api/generate/route.ts,lib/rateLimiter.ts"

# Environment variables
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  condition = "!({country} = \"US\")"

# Cache configuration for Next.js
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/public/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
